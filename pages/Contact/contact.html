<body>
    <div class="wrapper">
        <header id="header" class="header">

            <div class="header__container">

                <div class="header__logo">
                    <h1><img class="header__logo_pic" src="../../assets/images/LOGO_TENco.png" alt="TenCo"></h1>

                </div>

                <div class="header__menu menu">
                    <div class="menu__icon">
                        <span></span>
                    </div>
                    <nav class="menu__body">
                        <ul class="menu__list">
                            <li><a href="../Home/home.html" class="menu__link">Home</a></li>
                            <li><a href="../About_Us/about.html" class="menu__link">About Us</a></li>
                            <li><a href="../Services/services.html" class="menu__link">Services</a></li>
                            <li><a href="../Membership/membership.html" class="menu__link">Membership</a></li>
                            <li><a href="../Events/events.html" class="menu__link">Events</a></li>

            </div>
        </header>

        <main>
            <section class="section">
                <div class="bg__container contact">
                    <h2 class="section__title contact_title">Contact us</h2>


                    <div class="contact__flex">

                        <div class="contact-item adress">
                            <div class="contact__img">
                                <img src="../../assets/icons/location.png" alt="adress">
                            </div>
                            <h3 class="card_title">Headquarters</h3>
                            <p class="section__text">Rue Philippe-Plantamour 8<br>
                                1201 Geneva, Switzerland</p>
                        </div>

                        <div class="contact-item phone">
                            <div class="contact__img">
                                <img src="../../assets/icons/smartphone.png" alt="phone">
                            </div>
                            <h3 class="card_title">Telephone</h3>
                            <p class="section__text">+41 79 365 10 21</p>
                        </div>

                        <div class="contact-item mail">
                            <div class="contact__img">
                                <img src="../../assets/icons/email.png" alt="mail">
                            </div>
                            <h3 class="card_title">Email</h3>
                            <p class="section__text">contact@tenco.ch</p>
                        </div>

                    </div>
                </div>
            </section>

            <section class="frame">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d5052.02046837665!2d25.3181425!3d50.7197493!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sru!2sua!4v1624733922539!5m2!1sru!2sua"

                <p class="footer__title">

                <div class="footer__soc">
                    <img src="../../assets/icons/social_facebook_fb_35.png" alt="">
                    <img src="../../assets/icons/instagram_f_icon-icons.com_65485.png" alt="">
                    <img src="../../assets/icons/LinkedIn_Rounded_Solid_icon-icons.com_61559.png" alt="">

                <p class="footer__text">
                    ©2020 TENco SA - All rights reserved
                </p>
            </div>
